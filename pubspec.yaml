name: ai_designer_assist
description: "AI-powered family outfit coordination app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4

  # AI
  google_generative_ai: ^0.4.6

  # State management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # HTTP
  http: ^1.3.0

  # Calendar
  table_calendar: ^3.1.3

  # Local storage
  hive_flutter: ^1.1.0


  # Deep links
  url_launcher: ^6.3.1

  # Location
  geolocator: ^14.0.2

  # Permissions
  permission_handler: ^12.0.1

  # Screenshot / share
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5

  # Utils
  uuid: ^4.5.1

  # SVG rendering
  flutter_svg: ^2.2.3

  # UI helpers
  shimmer: ^3.0.0
  flex_color_scheme: ^8.2.0

  # Payments
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
